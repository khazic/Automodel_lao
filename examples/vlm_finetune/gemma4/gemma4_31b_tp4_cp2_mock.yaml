# Gemma 4 31B dense with TP=4 + CP=2, mock dataset smoke test.
#
# Topology: TP=4 (within node, over NVLink) x CP=2 x DP=4 = 32 GPUs
# (4 nodes x 8 H100-80GB, or equivalent).
#
#   - TP shards hidden dim across 4 ranks; sequence_parallel=true keeps
#     activations between sharded Linears as Shard(1) so LayerNorm /
#     residual adds run on S_local/tp_size tokens.
#   - CP shards the sequence dim across 2 ranks (requires the CP code from
#     feat/gemma4-context-parallelism; this PR only adds the TP/SP plan and
#     the example configs).
#   - FSDP2 shards params + grads + optimizer state across DP=4.
#
# Per-GPU memory budget on 80GB:
#   ~31B / 4(TP) / 4(DP) = 1.94B params * 16 bytes (bf16 wt + fp32 Adam) = ~31 GB
#   activations at seq=8K, S_local=4K (CP=2), hidden/tp=2688/4 = 672 => small
#
# Launch (single-line; backslash continuations are unreliable on some clusters):
#   torchrun --nnodes=4 --nproc-per-node=8 --node-rank=<0..3> \
#       --rdzv-backend=c10d --rdzv-endpoint=<master>:29500 \
#       nemo_automodel/recipes/vlm/finetune.py \
#       -c examples/vlm_finetune/gemma4/gemma4_31b_tp4_cp2_mock.yaml

recipe: FinetuneRecipeForVLM

step_scheduler:
  global_batch_size: 4
  local_batch_size: 1
  ckpt_every_steps: 9999
  val_every_steps: 9999
  max_steps: 10
  num_epochs: 1

dist_env:
  backend: nccl
  timeout_minutes: 30

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 42
  ranked: true

model:
  _target_: nemo_automodel.NeMoAutoModelForImageTextToText.from_pretrained
  pretrained_model_name_or_path: google/gemma-4-31B-it
  torch_dtype: torch.bfloat16
  use_liger_kernel: false
  use_sdpa_patching: false
  attn_implementation: sdpa
  text_config:
    use_cache: false

processor:
  padding_side: right

checkpoint:
  enabled: false

distributed:
  strategy: fsdp2
  dp_size: none       # auto: world_size / (tp_size * cp_size) = 32/4/2 = 4
  tp_size: 4          # TP within a single node over NVLink
  cp_size: 2
  sequence_parallel: true   # required to make TP memory-effective at long context
  activation_checkpointing: true

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy

dataset:
  _target_: nemo_automodel.components.datasets.vlm.mock.build_mock_vlm_dataset
  num_samples: 100
  num_images_per_sample: 0
  max_length: 8192
  seed: 42

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  num_workers: 0
  pin_memory: true
  drop_last: true

optimizer:
  _target_: torch.optim.AdamW
  lr: 1e-5
  weight_decay: 0.01
  betas: [0.9, 0.95]

freeze_config:
  freeze_embeddings: true
  freeze_vision_tower: true
  freeze_audio_tower: true
  freeze_language_model: false
