# To run this recipe:
#   automodel examples/llm_finetune/nemotron_flash/nemotron_flash_1b_squad.yaml --nproc-per-node 8
# Adjust --nproc-per-node to the number of GPUs available on your machine.

recipe: TrainFinetuneRecipeForNextTokenPrediction

step_scheduler:
  global_batch_size: 8
  local_batch_size: 1
  ckpt_every_steps: 1000
  val_every_steps: 10  # will run every x number of gradient steps
  num_epochs: 1

dist_env:
  backend: nccl
  timeout_minutes: 1

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 1111
  ranked: true

model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_pretrained
  force_hf: true
  pretrained_model_name_or_path: nvidia/Nemotron-Flash-1B
  trust_remote_code: true
  config:
    _target_: transformers.AutoConfig.from_pretrained
    pretrained_model_name_or_path: nvidia/Nemotron-Flash-1B
    trust_remote_code: True
    attn_implementation_new: flash_attention_2
    _attn_implementation: flash_attention_2

checkpoint:
  enabled: true
  checkpoint_dir: checkpoints/
  model_save_format: safetensors
  save_consolidated: true

distributed:
  strategy: fsdp2
  dp_size: none
  tp_size: 1
  cp_size: 1

  sequence_parallel: false

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy

dataset:
  _target_: nemo_automodel.components.datasets.llm.squad.make_squad_dataset
  dataset_name: rajpurkar/squad
  split: train

packed_sequence:
  packed_sequence_size: 0

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn: nemo_automodel.components.datasets.utils.default_collater
  shuffle: false

validation_dataset:
  _target_: nemo_automodel.components.datasets.llm.squad.make_squad_dataset
  dataset_name: rajpurkar/squad
  split: validation
  limit_dataset_samples: 64

validation_dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn: nemo_automodel.components.datasets.utils.default_collater

optimizer:
  _target_: torch.optim.Adam
  betas: [0.9, 0.999]
  eps: 1e-8
  lr: 1.0e-5
  weight_decay: 0
  # min_lr: 1.0e-5

lr_scheduler:
  lr_decay_style: cosine
  min_lr: 1.0e-6

ci:
  vllm_deploy: true
  recipe_owner: akoumpa
  time: "00:15:00"
  checkpoint_robustness:
    hf_kl_threshold: 5e-3
    distributed.tp_size: 2
    tokenizer_name: nvidia/Nemotron-Flash-1B
    dataset.limit_dataset_samples: 500
    validation_dataset.limit_dataset_samples: 500

