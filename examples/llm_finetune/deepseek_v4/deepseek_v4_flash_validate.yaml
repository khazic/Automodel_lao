# Minimal infra validation for DeepSeek V4 Flash — single node, 8×A100-80G.
# Uses only 4 transformer layers (emb + 4×layer + lm_head) to quickly verify
# EP+PP infrastructure end-to-end without needing to load all 43 layers.
# Loss will be large (expected); the goal is finite logits and no NCCL/shape errors.
#
# Parallelism: EP=4 × PP=2 = 8 GPUs total.
#   - 256 experts / EP=4 → 64 local experts per GPU
#   - 4 layers / PP=2 → 2 layers per pipeline stage
#
#   PYTHONPATH=/llm-align/liuchonghan/Automodel_lao python -m nemo_automodel.cli.app \
#     examples/llm_finetune/deepseek_v4/deepseek_v4_flash_validate.yaml \
#     --nproc-per-node 8

recipe: TrainFinetuneRecipeForNextTokenPrediction

seed: 1234

step_scheduler:
  # 8 GPUs with pp_size=2 -> dp_size=4; global must be a multiple of
  # local_batch_size * dp_size = 2 * 4 = 8.
  global_batch_size: 8
  local_batch_size: 2
  ckpt_every_steps: 1000
  val_every_steps: 100
  num_epochs: 1
  max_steps: 100

distributed:
  strategy: fsdp2
  tp_size: 1
  cp_size: 1
  pp_size: 2
  ep_size: 4

  sequence_parallel: false
  activation_checkpointing: true

  pipeline:
    pp_schedule: 1f1b
    pp_microbatch_size: 1

  moe:
    reshard_after_forward: false
    wrap_outer_model: false

dist_env:
  backend: nccl
  timeout_minutes: 30

model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_config
  config:
    _target_: nemo_automodel.components.models.deepseek_v4.config.DeepseekV4Config.from_pretrained
    pretrained_model_name_or_path: /llm-align/open_models/Deepseekv4
    name_or_path: /llm-align/open_models/Deepseekv4
    # Override to use only 4 layers for fast infra validation.
    # Layers 4-42 are simply not created; checkpoint keys for them are ignored (strict=False).
    num_hidden_layers: 4
    # P2 smoke: make layers 0 and 1 hash-routing (DeepseekV4HashGate with
    # tid2eid lookup).  With pp_size=2, stage 0 owns layers [0, 1] so all
    # hash layers live where input_ids is available.
    num_hash_layers: 2
    compress_ratios: [0, 0, 0, 0]
    num_nextn_predict_layers: 0
  trust_remote_code: false
  load_base_model: true
  backend:
    _target_: nemo_automodel.components.models.common.BackendConfig
    attn: sdpa
    linear: torch
    rms_norm: torch_fp32
    rope_fusion: false
    dispatcher: torch
    experts: torch_mm
    enable_hf_state_dict_adapter: true
    enable_fsdp_optimizations: true

checkpoint:
  enabled: false
  dequantize_base_checkpoint: true

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy

dataset:
  _target_: nemo_automodel.components.datasets.llm.hellaswag.HellaSwag
  path_or_dataset: rowan/hellaswag
  split: train
  tokenizer:
    _target_: transformers.AutoTokenizer.from_pretrained
    pretrained_model_name_or_path: /llm-align/open_models/Deepseekv4

packed_sequence:
  packed_sequence_size: 0

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn:
    _target_: nemo_automodel.components.datasets.utils.default_collater
    pad_seq_len_divisible: 64
  shuffle: true

validation_dataset:
  _target_: nemo_automodel.components.datasets.llm.hellaswag.HellaSwag
  path_or_dataset: rowan/hellaswag
  split: validation
  tokenizer:
    _target_: transformers.AutoTokenizer.from_pretrained
    pretrained_model_name_or_path: /llm-align/open_models/Deepseekv4

validation_dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn:
    _target_: nemo_automodel.components.datasets.utils.default_collater
    pad_seq_len_divisible: 64
  shuffle: false
  drop_last: true

optimizer:
  _target_: torch.optim.AdamW
  betas:
  - 0.9
  - 0.95
  eps: 1e-8
  lr: 1e-5
  weight_decay: 0.1
