# P0 — End-to-end forward/backward/PP/EP health check for HYV3ForCausalLM.
#
# Uses the real tencent/Hy3-preview config and weights, but only 4 layers.
# Layers 4-79 are never created; their checkpoint keys are ignored (strict=False).
# Tests real tensor shapes (hidden=4096, 192 experts) and real routing logic.
#
# Layer layout (4 layers, pp=2):
#   Stage 0: embed + layer 0 (dense) + layer 1 (MoE)
#   Stage 1: layer 2 (MoE) + layer 3 (MoE) + lm_head
#   ep_size=4 → 192 / 4 = 48 experts per rank
#   total GPUs = pp(2) × ep(4) = 8
#
# Hardware: 8× GPU (A100 80GB or equivalent)
#   automodel examples/llm_finetune/hy_v3/hy3_4layer_p0_smoke.yaml --nproc-per-node 8
#
# Before running: set HY3_PATH to your local Hy3-preview directory, then
# replace the two pretrained_model_name_or_path fields below accordingly.
#
# Expected outcomes:
#   - Training starts within 3 min (HF checkpoint loading for 4 layers)
#   - Loss at step 100 < loss at step 1
#   - No NaN / Inf in loss or gradients
#   - Memory stable at every step (no OOM growth)
#   - Validation runs at step 2 without error

recipe: TrainFinetuneRecipeForNextTokenPrediction

step_scheduler:
  global_batch_size: 8
  local_batch_size: 2
  ckpt_every_steps: 999999     # disable checkpoint for P0
  val_every_steps: 2
  max_steps: 100

dist_env:
  backend: nccl
  timeout_minutes: 30

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 1234
  ranked: true

model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_config
  config:
    _target_: transformers.AutoConfig.from_pretrained
    pretrained_model_name_or_path: /llm-align/open_models/hunyuan3
    num_hidden_layers: 4           # only build layers 0-3; keys for 4-79 ignored
  load_base_model: true
  trust_remote_code: false
  backend:
    _target_: nemo_automodel.components.models.common.BackendConfig
    attn: sdpa
    linear: torch
    rms_norm: torch_fp32
    experts: torch_mm
    dispatcher: torch              # torch dispatcher for P0
    fake_balanced_gate: false
    gate_precision: float32
    rope_fusion: false
    enable_hf_state_dict_adapter: true
    enable_fsdp_optimizations: true

checkpoint:
  enabled: false
  checkpoint_dir: /tmp/checkpoints/hy3_p0/

distributed:
  strategy: fsdp2
  tp_size: 1
  cp_size: 1
  pp_size: 2
  ep_size: 4                       # 192 / 4 = 48 experts per rank

  sequence_parallel: false
  activation_checkpointing: true

  pipeline:
    pp_schedule: 1f1b
    pp_microbatch_size: 1
    round_virtual_stages_to_pp_multiple: down
    scale_grads_in_schedule: false
    patch_inner_model: false
    patch_causal_lm_model: false

  moe:
    reshard_after_forward: false
    wrap_outer_model: false

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy

dataset:
  _target_: nemo_automodel.components.datasets.llm.hellaswag.HellaSwag
  path_or_dataset: rowan/hellaswag
  split: train
  tokenizer:
    _target_: transformers.AutoTokenizer.from_pretrained
    pretrained_model_name_or_path: /llm-align/open_models/hunyuan3

packed_sequence:
  packed_sequence_size: 0

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn:
    _target_: nemo_automodel.components.datasets.utils.default_collater
    pad_seq_len_divisible: 64
  shuffle: true

validation_dataset:
  _target_: nemo_automodel.components.datasets.llm.hellaswag.HellaSwag
  path_or_dataset: rowan/hellaswag
  split: validation
  num_samples_limit: 32
  tokenizer:
    _target_: transformers.AutoTokenizer.from_pretrained
    pretrained_model_name_or_path: /llm-align/open_models/hunyuan3

validation_dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn:
    _target_: nemo_automodel.components.datasets.utils.default_collater
    pad_seq_len_divisible: 64
  shuffle: false
  drop_last: true

optimizer:
  _target_: torch.optim.AdamW
  betas: [0.9, 0.95]
  eps: 1e-8
  lr: 1e-5
  weight_decay: 0.0

ci:
  recipe_owner: khazic
  time: "00:30:00"
