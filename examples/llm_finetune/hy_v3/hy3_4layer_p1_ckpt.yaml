# P1 — Checkpoint save / resume health check for HYV3ForCausalLM.
#
# Same 4-layer truncated setup as P0 (real weights, real dims) but with DCP
# checkpoint enabled. Tests that the full FSDP2+EP state — including the
# e_score_correction_bias Gate buffers — is saved and restored correctly.
#
# Procedure:
#   1. Run for 100 steps; a DCP checkpoint is saved at step 50.
#   2. Kill the job, then re-run with --resume pointing to the saved checkpoint.
#   3. Confirm loss at step 51 (post-resume) matches the original run ± 1e-4.
#
# Hardware: 8× GPU (A100 80GB or equivalent)
#   automodel examples/llm_finetune/hy_v3/hy3_4layer_p1_ckpt.yaml --nproc-per-node 8
#
# Expected outcomes:
#   - epoch_0_step_50/ directory present after Run 1
#   - Loss at step 51 (resumed) ≡ loss at step 51 (original) ± 1e-4
#   - e_score_correction_bias norm identical at step 51 across both runs

recipe: TrainFinetuneRecipeForNextTokenPrediction

step_scheduler:
  global_batch_size: 8
  local_batch_size: 2
  ckpt_every_steps: 50
  val_every_steps: 10
  max_steps: 100

dist_env:
  backend: nccl
  timeout_minutes: 30

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 1234
  ranked: true

model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_config
  config:
    _target_: transformers.AutoConfig.from_pretrained
    pretrained_model_name_or_path: /llm-align/open_models/hunyuan3
    num_hidden_layers: 4
  load_base_model: true
  trust_remote_code: false
  backend:
    _target_: nemo_automodel.components.models.common.BackendConfig
    attn: sdpa
    linear: torch
    rms_norm: torch_fp32
    experts: torch_mm
    dispatcher: torch
    fake_balanced_gate: false
    gate_precision: float32
    rope_fusion: false
    enable_hf_state_dict_adapter: true
    enable_fsdp_optimizations: true

checkpoint:
  enabled: true
  checkpoint_dir: /tmp/checkpoints/hy3_p1/
  model_save_format: safetensors
  save_consolidated: false

distributed:
  strategy: fsdp2
  tp_size: 1
  cp_size: 1
  pp_size: 2
  ep_size: 4

  sequence_parallel: false
  activation_checkpointing: true

  pipeline:
    pp_schedule: 1f1b
    pp_microbatch_size: 1
    round_virtual_stages_to_pp_multiple: down
    scale_grads_in_schedule: false
    patch_inner_model: false
    patch_causal_lm_model: false

  moe:
    reshard_after_forward: false
    wrap_outer_model: false

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy

dataset:
  _target_: nemo_automodel.components.datasets.llm.hellaswag.HellaSwag
  path_or_dataset: rowan/hellaswag
  split: train
  tokenizer:
    _target_: transformers.AutoTokenizer.from_pretrained
    pretrained_model_name_or_path: /llm-align/open_models/hunyuan3

packed_sequence:
  packed_sequence_size: 0

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn:
    _target_: nemo_automodel.components.datasets.utils.default_collater
    pad_seq_len_divisible: 64
  shuffle: true

validation_dataset:
  _target_: nemo_automodel.components.datasets.llm.hellaswag.HellaSwag
  path_or_dataset: rowan/hellaswag
  split: validation
  num_samples_limit: 32
  tokenizer:
    _target_: transformers.AutoTokenizer.from_pretrained
    pretrained_model_name_or_path: /llm-align/open_models/hunyuan3

validation_dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn:
    _target_: nemo_automodel.components.datasets.utils.default_collater
    pad_seq_len_divisible: 64
  shuffle: false
  drop_last: true

optimizer:
  _target_: torch.optim.AdamW
  betas: [0.9, 0.95]
  eps: 1e-8
  lr: 1e-5
  weight_decay: 0.0

ci:
  recipe_owner: khazic
  time: "00:30:00"
