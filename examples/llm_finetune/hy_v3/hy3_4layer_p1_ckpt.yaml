# P1 — Checkpoint save / resume health check for HYV3ForCausalLM.
#
# Proxy model (4 layers, same topology as P0) — no checkpoint download required.
# Extends P0 by enabling DCP checkpoint writing and validating that resume
# from mid-training produces an identical loss trajectory.
#
# Procedure:
#   1. Run for 100 steps; a checkpoint is saved at step 50.
#   2. Kill the job, re-run with --resume pointing to the saved checkpoint.
#   3. Confirm loss at step 51 (post-resume) matches the reference log.
#
# Hardware: 8× GPU (A100 80GB or equivalent)
#   automodel examples/llm_finetune/hy_v3/hy3_4layer_p1_ckpt.yaml --nproc-per-node 8
#
# Expected outcomes:
#   - Checkpoint directory contains epoch_0_step_50/
#   - Loss at step 51 (resumed) ≡ loss at step 51 (original run) ± 1e-4
#   - No NaN / Inf in loss or gradients after resume
#   - e_score_correction_bias restored correctly (verify via logged norm)

recipe: TrainFinetuneRecipeForNextTokenPrediction

step_scheduler:
  global_batch_size: 16
  local_batch_size: 4
  ckpt_every_steps: 50
  val_every_steps: 10
  max_steps: 100

dist_env:
  backend: nccl
  timeout_minutes: 15

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 1234
  ranked: true

model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_config
  config:
    _target_: transformers.PretrainedConfig
    architectures: [HYV3ForCausalLM]
    model_type: hy_v3
    # --- proxy dimensions (identical to P0) ---
    vocab_size: 120832
    hidden_size: 2048
    num_hidden_layers: 4         # 1 dense (layer 0) + 3 MoE
    num_attention_heads: 16
    num_key_value_heads: 4
    head_dim: 128
    intermediate_size: 4096
    moe_intermediate_size: 512
    max_position_embeddings: 2048
    hidden_act: silu
    rms_norm_eps: 1.0e-5
    rope_parameters:
      rope_theta: 11158840.0
      rope_type: default
    # --- MoE topology ---
    num_experts: 8
    num_experts_per_tok: 2
    num_shared_experts: 1
    first_k_dense_replace: 1
    # --- HYV3-specific routing ---
    moe_router_use_sigmoid: true
    moe_router_enable_expert_bias: true
    route_norm: true
    router_scaling_factor: 2.826
    qk_norm: true
    initializer_range: 0.02
    bos_token_id: 120000
    eos_token_id: 120025
    pad_token_id: 120002
    use_cache: false
    torch_dtype: bfloat16
  trust_remote_code: false
  backend:
    _target_: nemo_automodel.components.models.common.BackendConfig
    attn: sdpa
    linear: torch
    rms_norm: torch_fp32
    experts: torch_mm
    dispatcher: torch
    fake_balanced_gate: false
    enable_hf_state_dict_adapter: false
    enable_fsdp_optimizations: true

checkpoint:
  enabled: true
  checkpoint_dir: /tmp/checkpoints/hy3_p1/
  model_save_format: safetensors
  save_consolidated: false

distributed:
  strategy: fsdp2
  tp_size: 1
  cp_size: 1
  pp_size: 2
  ep_size: 4

  sequence_parallel: false
  activation_checkpointing: true

  pipeline:
    pp_schedule: interleaved1f1b
    pp_microbatch_size: 1
    layers_per_stage: 1
    round_virtual_stages_to_pp_multiple: down
    scale_grads_in_schedule: false
    patch_inner_model: false
    patch_causal_lm_model: false

  moe:
    reshard_after_forward: false
    wrap_outer_model: false

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy

dataset:
  _target_: nemo_automodel.components.datasets.llm.hellaswag.HellaSwag
  path_or_dataset: rowan/hellaswag
  split: train
  tokenizer:
    pretrained_model_name_or_path: tencent/Hy3-preview

packed_sequence:
  packed_sequence_size: 0

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn: nemo_automodel.components.datasets.utils.default_collater
  shuffle: true

validation_dataset:
  _target_: nemo_automodel.components.datasets.llm.hellaswag.HellaSwag
  path_or_dataset: rowan/hellaswag
  split: validation
  num_samples_limit: 32
  tokenizer:
    pretrained_model_name_or_path: tencent/Hy3-preview

validation_dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn: nemo_automodel.components.datasets.utils.default_collater
  batch_size: 4

optimizer:
  _target_: torch.optim.Adam
  betas: [0.9, 0.95]
  eps: 1.0e-7
  lr: 5.0e-4
  weight_decay: 0.0

ci:
  recipe_owner: khazic
  time: "00:30:00"
