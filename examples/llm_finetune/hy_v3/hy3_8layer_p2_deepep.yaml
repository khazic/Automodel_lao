# P2 — DeepEP dispatcher scale-up test for HYV3ForCausalLM.
#
# Uses the real tencent/Hy3-preview config and weights, 8 layers.
# Layers 8-79 are never created; their checkpoint keys are ignored (strict=False).
# Replaces the torch dispatcher with deepep to validate communicate-compute
# overlap (async_finish=True) with real expert tensor shapes.
#
# Layer layout (8 layers, pp=2):
#   Stage 0: embed + layers 0-3 (1 dense + 3 MoE)
#   Stage 1: layers 4-7 (all MoE) + lm_head
#   ep_size=4 → 192 / 4 = 48 experts per rank
#   total GPUs = pp(2) × ep(4) = 8
#
# Hardware: 8× GPU (A100 80GB or equivalent) with NVLink / NVSwitch for DeepEP
#   automodel examples/llm_finetune/hy_v3/hy3_8layer_p2_deepep.yaml --nproc-per-node 8
#
# Expected outcomes:
#   - First step slow (DeepEP kernel JIT compile); subsequent steps fast
#   - Loss at step 200 < loss at step 1
#   - No NaN / Inf in loss or gradients
#   - Throughput higher than P0 torch run after warmup

recipe: TrainFinetuneRecipeForNextTokenPrediction

step_scheduler:
  global_batch_size: 8
  local_batch_size: 2
  ckpt_every_steps: 999999     # disable checkpoint for P2
  val_every_steps: 20
  max_steps: 200

dist_env:
  backend: nccl
  timeout_minutes: 45

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 1234
  ranked: true

model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_config
  config:
    _target_: transformers.AutoConfig.from_pretrained
    pretrained_model_name_or_path: /llm-align/open_models/hunyuan3
    num_hidden_layers: 8           # only build layers 0-7; keys for 8-79 ignored
  load_base_model: true
  trust_remote_code: false
  backend:
    _target_: nemo_automodel.components.models.common.BackendConfig
    attn: sdpa
    linear: torch
    rms_norm: torch_fp32
    experts: torch_mm
    dispatcher: deepep             # DeepEP for communicate-compute overlap
    fake_balanced_gate: false
    gate_precision: float32
    rope_fusion: false
    enable_hf_state_dict_adapter: true
    enable_fsdp_optimizations: true

checkpoint:
  enabled: false
  checkpoint_dir: /tmp/checkpoints/hy3_p2/

distributed:
  strategy: fsdp2
  tp_size: 1
  cp_size: 1
  pp_size: 2
  ep_size: 4                       # 192 / 4 = 48 experts per rank

  sequence_parallel: false
  activation_checkpointing: true

  pipeline:
    pp_schedule: 1f1b
    pp_microbatch_size: 1
    round_virtual_stages_to_pp_multiple: down
    scale_grads_in_schedule: false
    patch_inner_model: false
    patch_causal_lm_model: false

  moe:
    reshard_after_forward: false
    wrap_outer_model: false

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy

dataset:
  _target_: nemo_automodel.components.datasets.llm.hellaswag.HellaSwag
  path_or_dataset: rowan/hellaswag
  split: train
  tokenizer:
    _target_: transformers.AutoTokenizer.from_pretrained
    pretrained_model_name_or_path: /llm-align/open_models/hunyuan3

packed_sequence:
  packed_sequence_size: 0

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn:
    _target_: nemo_automodel.components.datasets.utils.default_collater
    pad_seq_len_divisible: 64
  shuffle: true

validation_dataset:
  _target_: nemo_automodel.components.datasets.llm.hellaswag.HellaSwag
  path_or_dataset: rowan/hellaswag
  split: validation
  num_samples_limit: 32
  tokenizer:
    _target_: transformers.AutoTokenizer.from_pretrained
    pretrained_model_name_or_path: /llm-align/open_models/hunyuan3

validation_dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn:
    _target_: nemo_automodel.components.datasets.utils.default_collater
    pad_seq_len_divisible: 64
  shuffle: false
  drop_last: true

optimizer:
  _target_: torch.optim.AdamW
  betas: [0.9, 0.95]
  eps: 1e-8
  lr: 1e-5
  weight_decay: 0.0

ci:
  recipe_owner: khazic
  time: "00:45:00"
