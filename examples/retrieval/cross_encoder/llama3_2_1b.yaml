# LoRA/PEFT configuration
# Uncomment and configure for LoRA/PEFT
# peft:
#   _target_: nemo_automodel.components._peft.lora.PeftConfig
#   target_modules:
#     - q_proj
#     - k_proj
#     - v_proj
#     - o_proj
#     - gate_proj
#     - up_proj
#     - down_proj
#   exclude_modules: []
#   match_all_linear: True
#   dim: 16
#   alpha: 32
#   use_triton: true

optimizer:
  _target_: transformer_engine.pytorch.optimizers.fused_adam.FusedAdam
  lr: 3.0e-6
  weight_decay: 0.01
  adam_w_mode: true
  bias_correction: true
  master_weights: true

lr_scheduler:
  lr_warmup_steps: 100

checkpoint:
  enabled: true
  checkpoint_dir: ./output/llama3_2_1b_cross_encoder/checkpoints
  model_save_format: safetensors
  save_consolidated: true

distributed:
  strategy: fsdp2
  dp_size: none
  tp_size: 1
  cp_size: 1

  sequence_parallel: false

