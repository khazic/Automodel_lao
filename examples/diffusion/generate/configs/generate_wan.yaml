model:
  pretrained_model_name_or_path: "Wan-AI/Wan2.1-T2V-1.3B-Diffusers"
  checkpoint: null
  lora_weights: null              # set to: PATH_TO_CKPT/checkpoint-1000
  lora_adapter_name: "default"   # must match adapter_name used at save time
  lora_scale: 1.0                # lora_alpha / rank; 1.0 = full contribution

inference:
  num_inference_steps: 50
  guidance_scale: 5.0
  height: 480
  width: 832
  dtype: "bfloat16"
  max_samples: 10
  prompts:
    - "A cat sitting on a windowsill watching the rain"
  pipeline_kwargs:
    num_frames: 81
    negative_prompt: ""

output:
  output_dir: "./inference_outputs"
  fps: 16

distributed: null

vae:
  enable_slicing: true
  enable_tiling: true
  enable_cpu_offload: false

seed: 42
