# Gemma4 31B VLM SFT — single-node 8×GPU TP4×PP2 test recipe.
#
# Topology: 1 node × 8 GPUs
#   tp_size=4, pp_size=2  →  dp_size=1  (8 / 4 / 2)
#   local_batch_size=2, global_batch_size=2
#   pp_microbatch_size=1  →  2 microbatches per step (fills both PP stages)
#
# Launch:
#   bash examples_lao/gemma4/run_gemma4_31b_sft_tp4_pp2.sh

recipe: FinetuneRecipeForVLM

step_scheduler:
  global_batch_size: 2
  local_batch_size: 2
  ckpt_every_steps: 500
  val_every_steps: null
  num_epochs: 1

dist_env:
  backend: nccl
  timeout_minutes: 60

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 42
  ranked: true

model:
  _target_: nemo_automodel.NeMoAutoModelForImageTextToText.from_pretrained
  pretrained_model_name_or_path: /llm-align/open_models/gemma4/gemma-4-31B-it
  torch_dtype: torch.bfloat16
  use_liger_kernel: false
  use_sdpa_patching: false
  attn_implementation: sdpa
  text_config:
    use_cache: false

checkpoint:
  enabled: false

distributed:
  strategy: fsdp2
  dp_size: none   # auto: 8 / tp_size(4) / pp_size(2) = 1
  tp_size: 4
  cp_size: 1
  pp_size: 2
  ep_size: 1

  sequence_parallel: false
  activation_checkpointing: true

  pipeline:
    pp_schedule: 1f1b
    pp_microbatch_size: 1
    scale_grads_in_schedule: false

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy

dataset:
  _target_: examples_lao/gemma4/parquet_messages_dataset.py:make_parquet_messages_dataset
  path_or_dataset:
    - /llm-align/liuchonghan/ins_dataset/ins_dataset/dayuzhong/dayuzhong_instruct_gemini3.1_5w.parquet
  split: train
  shuffle_seed: 42
  limit_dataset_samples: 64

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  num_workers: 0
  pin_memory: true
  collate_fn:
    _target_: examples_lao/gemma4/parquet_messages_dataset.py:gemma4_prefix_truncating_collate_fn
    max_length: 1024

optimizer:
  _target_: torch.optim.AdamW
  lr: 1e-5
  weight_decay: 0.01
  betas: [0.9, 0.95]

lr_scheduler:
  lr_decay_style: cosine

freeze_config:
  freeze_embeddings: true
  freeze_vision_tower: true
  freeze_audio_tower: true
  freeze_language_model: false
