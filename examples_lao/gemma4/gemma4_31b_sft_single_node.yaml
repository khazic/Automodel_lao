# Gemma 4 31B Full-Parameter SFT — single-node 8×GPU recipe.
# Follows the upstream gemma4_31b.yaml layout (tp_size=1, no sequence_parallel),
# which the NeMo Automodel maintainers confirmed works on 8×H100 80G.
#
# Launch:
#   torchrun --nproc-per-node=8 \
#       -m nemo_automodel.cli.app \
#       examples_lao/gemma4/gemma4_31b_sft_single_node.yaml
#
# Cache dirs (HF_HOME, TORCH_HOME, etc.) are set by run_gemma4_31b_sft_k8s.sh.

recipe: FinetuneRecipeForVLM

step_scheduler:
  global_batch_size: 8
  local_batch_size: 1
  ckpt_every_steps: 500
  val_every_steps: null
  num_epochs: 1

dist_env:
  backend: nccl
  timeout_minutes: 60

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 42
  ranked: true

model:
  _target_: nemo_automodel.NeMoAutoModelForImageTextToText.from_pretrained
  pretrained_model_name_or_path: /llm-align/open_models/gemma4/gemma-4-31B-it
  torch_dtype: torch.bfloat16
  use_liger_kernel: true
  use_sdpa_patching: false
  attn_implementation: sdpa
  # Gemma4 31B does not use kv_shared layers, so keep use_cache disabled for training.
  text_config:
    use_cache: false

checkpoint:
  enabled: true
  checkpoint_dir: /llm-align/liuchonghan/ckpt_automodel/gemma4_31b_sft_single/
  model_save_format: safetensors
  save_consolidated: false

distributed:
  strategy: fsdp2
  dp_size: none
  tp_size: 1
  cp_size: 1
  sequence_parallel: false
  # Activation checkpointing is required for Gemma4 31B to fit in memory.
  activation_checkpointing: true

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy

dataset:
  _target_: /llm-align/liuchonghan/Automodel_lao/examples_lao/gemma4/parquet_messages_dataset.py:make_parquet_messages_dataset
  path_or_dataset:
    - /llm-align/liuchonghan/ins_dataset/ins_dataset/dayuzhong/dayuzhong_instruct_gemini3.1_5w.parquet
    - /llm-align/liuchonghan/ins_dataset/ins_dataset/dayuzhong/dyz_trans_10w_gemini3.1.parquet
  split: train
  shuffle_seed: 42

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  num_workers: 0
  pin_memory: true
  collate_fn:
    _target_: /llm-align/liuchonghan/Automodel_lao/examples_lao/gemma4/parquet_messages_dataset.py:gemma4_prefix_truncating_collate_fn
    max_length: 512

optimizer:
  _target_: torch.optim.AdamW
  lr: 1e-5
  weight_decay: 0.01
  betas: [0.9, 0.95]

lr_scheduler:
  lr_decay_style: cosine

freeze_config:
  freeze_embeddings: true
  freeze_vision_tower: true
  freeze_audio_tower: true
  freeze_language_model: false

